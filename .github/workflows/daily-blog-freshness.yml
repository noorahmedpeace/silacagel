name: Daily blog freshness

# Runs every day and keeps the site looking active for Google and AI without
# spammy thin content: it asks Claude to add ONE genuinely useful FAQ to the
# stalest blog article, bumps that article's updatedAt + the global
# sitemapLastModified to today, commits, pushes (Vercel auto-deploys), and
# pings IndexNow.
#
# Requires repo secret ANTHROPIC_API_KEY (Settings -> Secrets and variables ->
# Actions -> New repository secret).

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC = 09:00 Asia/Karachi
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

# Never run two refresh commits at once.
concurrency:
  group: daily-blog-freshness
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate FAQ + bump freshness dates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-blog-ai-faq.mjs

      - name: Type-check (guard against a broken articles.ts)
        run: npx --yes tsc --noEmit

      - name: Commit and push
        run: |
          git config user.name "drygelworld-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily freshness: new FAQ on ${FRESH_SLUG:-blog article}"
          git push

      - name: Ping IndexNow
        run: npm run indexnow
        continue-on-error: true # a rate-limit ping shouldn't fail the run
